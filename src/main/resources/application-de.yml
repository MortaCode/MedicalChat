spring:
  application:
    name: MedicalChat-de
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/chat?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password:
    hikari:
      minimum-idle: 8
      maximum-pool-size: 12
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: ${spring.application.name}
  vector:
    datasource:
      driver-class-name: org.postgresql.Driver
      url:
      username: MyAgent
      password:
      hikari:
        maximum-pool-size: 5
        minimum-idle: 2

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  file:
    path: ./logs/MedicalChat/